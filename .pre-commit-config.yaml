default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
        args: [--fix, --per-file-ignores, '*.ipynb:E402']
        exclude: ^fig_scripts/pmg-api-usage-dependent-dependency/api-analyzer/tests/data/
      - id: ruff-format
        exclude: ^fig_scripts/pmg-api-usage-dependent-dependency/api-analyzer/tests/data/


  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: v0.0.52
    hooks:
      - id: ty
        args: [--isolated] # don't create/update uv.lock or the local .venv
        env: { UV_FROZEN: "0" } # prek-only: override global UV_FROZEN=1 which would require a uv.lock

  - repo: builtin
    hooks:
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        stages: [pre-commit, commit-msg]
        exclude_types: [bib, svg, json]
        exclude: pyproject.toml
        args: [--check-filenames, --ignore-words-list, 'atomate,ElemNet,dscribe,basf,vise,HAppend']

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.0
    hooks:
      - id: markdownlint
        # MD013: line too long
        # MD024: Multiple headings with the same content
        # MD033: no inline HTML
        # MD041: first line in a file should be a top-level heading
        # MD025: single title
        args: [--disable, MD013, MD024, MD025, MD033, MD041, '--']

  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout
        args: [--drop-empty-cells, --keep-output]

  - repo: local
    hooks:
      - id: validate-typst
        name: Validate Typst files compile without errors
        language: system
        # typst check command tracked in https://github.com/typst/typst/issues/3792
        entry: bash -c 'for x in "$@"; do typst compile "$x" - > /dev/null || exit 255; done' --
        files: \.typ$
        types: [file]

  - repo: https://github.com/crate-ci/typos
    rev: v1.47.2
    hooks:
      - id: typos
        types: [text]
        exclude: ^fig_scripts/.+/.+.csv$
        exclude_types: [svg, bib]
