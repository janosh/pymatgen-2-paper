ci:
  autoupdate_schedule: quarterly

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff-check
        args: [--fix, --per-file-ignores, '*.ipynb:E402']
        exclude: ^fig_scripts/pmg-api-usage-dependent-dependency/api-analyzer/tests/data/
      - id: ruff-format
        exclude: ^fig_scripts/pmg-api-usage-dependent-dependency/api-analyzer/tests/data/

  - repo: local
    hooks:
      - id: ty
        args: [--ignore, unresolved-import]
        name: ty check
        exclude: tests/data
        files: \.py$
        entry: ty check
        language: python
        additional_dependencies: [ty]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
        exclude_types: [bib]
      - id: trailing-whitespace
        exclude_types: [bib]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        stages: [pre-commit, commit-msg]
        exclude_types: [html, csv, bib, svg, json]
        exclude: pyproject.toml
        args: [--check-filenames, --ignore-words-list, atomate]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        # MD013: line too long
        # MD024: Multiple headings with the same content
        # MD033: no inline HTML
        # MD041: first line in a file should be a top-level heading
        # MD025: single title
        args: [--disable, MD013, MD024, MD025, MD033, MD041, '--']

  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout
        args: [--drop-empty-cells, --keep-output]

  - repo: local
    hooks:
      - id: validate-typst
        name: Validate Typst files compile without errors
        language: system
        # xargs exit 255 to fail on first compile error https://stackoverflow.com/a/26485626/4034025
        # bash for-loop adapted from https://github.com/pre-commit/pre-commit/issues/394#issuecomment-588562966
        # typst check command tracked in https://github.com/typst/typst/issues/3792
        entry: bash -c 'for x in "$@"; do typst compile "$x" - > /dev/null || exit 255; done' --
        files: \.typ$
        types: [file]

  - repo: https://github.com/crate-ci/typos
    rev: v1.44.0
    hooks:
      - id: typos
        types: [text]
        exclude: ^(.+/_.+.(json|csv)|fig_scripts/.+/.+.(csv|json))$
        exclude_types: [svg, bib]
        args:
          - --config
          - fig_scripts/pmg-api-usage-dependent-dependency/api-analyzer/pyproject.toml
